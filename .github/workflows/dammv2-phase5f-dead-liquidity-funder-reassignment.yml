name: DAMM v2 Phase5F dead-liquidity funder reassignment

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dammv2-phase5f-dead-liquidity-funder-reassignment.yml"

jobs:
  phase5f:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Checkout DAMM v2
        uses: actions/checkout@v4
        with:
          repository: MeteoraAg/damm-v2
          path: damm-v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - name: Install Solana/Agave CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI 1.0.2
        run: |
          cargo install \
            --git https://github.com/solana-foundation/anchor \
            --tag v1.0.2 \
            anchor-cli \
            --locked \
            --force

      - name: Patch Phase5F test
        working-directory: damm-v2
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("tests/deadLiquidityReward.test.ts")
          s = p.read_text()

          # Import updateRewardFunder from ./helpers.
          if "    updateRewardFunder,\n" not in s:
              s = s.replace(
                  "    U64_MAX,\n    warpToTimestamp,\n",
                  "    U64_MAX,\n    updateRewardFunder,\n    warpToTimestamp,\n",
              )

          # Import ATA creator helper.
          if 'getOrCreateAssociatedTokenAccount' not in s:
              s = s.replace(
                  'import { BaseFeeMode, encodeFeeTimeSchedulerParams } from "./helpers/feeCodec";\n',
                  'import { BaseFeeMode, encodeFeeTimeSchedulerParams } from "./helpers/feeCodec";\n'
                  'import { getOrCreateAssociatedTokenAccount } from "./helpers/token";\n',
              )

          marker = 'describe("Funder can withdrawDeadLiquidityReward from DEAD_LIQUIDITY share"'
          idx = s.find(marker)
          if idx == -1:
              raise SystemExit("Phase5F describe marker not found")

          line_start = s.rfind("\n", 0, idx) + 1
          line_end = s.find("\n", idx)
          describe_line = s[line_start:line_end]
          indent = describe_line[:len(describe_line) - len(describe_line.lstrip())]
          test_indent = indent + "  "

          test_block = f'''
{test_indent}it("PHASE5F: creator can reassign already-funded reward0 funder and withdraw dead-liquidity rewards", async () => {{
{test_indent}  const {{ pool, position, rewardEnd, rewardMid }} =
{test_indent}    await setupFundedCompoundingPool();

{test_indent}  expect(getPool(svm, pool).rewardInfos[REWARD_INDEX].funder.toString()).eq(
{test_indent}    funder.publicKey.toString()
{test_indent}  );

{test_indent}  await updateRewardFunder(svm, {{
{test_indent}    index: REWARD_INDEX,
{test_indent}    signer: creator,
{test_indent}    pool,
{test_indent}    newFunder: creator.publicKey,
{test_indent}  }});

{test_indent}  expect(getPool(svm, pool).rewardInfos[REWARD_INDEX].funder.toString()).eq(
{test_indent}    creator.publicKey.toString()
{test_indent}  );

{test_indent}  const creatorRewardAta = getOrCreateAssociatedTokenAccount(
{test_indent}    svm,
{test_indent}    creator,
{test_indent}    rewardMint,
{test_indent}    creator.publicKey,
{test_indent}    TOKEN_PROGRAM_ID
{test_indent}  );

{test_indent}  warpToTimestamp(svm, rewardMid);

{test_indent}  await claimReward(svm, {{
{test_indent}    index: REWARD_INDEX,
{test_indent}    user: creator,
{test_indent}    pool,
{test_indent}    position,
{test_indent}    skipReward: 0,
{test_indent}  }});

{test_indent}  await removeAllLiquidity(svm, {{
{test_indent}    owner: creator,
{test_indent}    pool,
{test_indent}    position,
{test_indent}    tokenAAmountThreshold: new BN(0),
{test_indent}    tokenBAmountThreshold: new BN(0),
{test_indent}  }});

{test_indent}  const afterExit = getPool(svm, pool);
{test_indent}  expect(afterExit.liquidity.toString()).eq(DEAD_LIQUIDITY.toString());

{test_indent}  warpToTimestamp(svm, rewardEnd.addn(1));

{test_indent}  const rewardVault = afterExit.rewardInfos[REWARD_INDEX].vault;
{test_indent}  const before = new BN(getTokenBalance(svm, creatorRewardAta));

{test_indent}  await withdrawDeadLiquidityReward(svm, {{
{test_indent}    index: REWARD_INDEX,
{test_indent}    funder: creator,
{test_indent}    pool,
{test_indent}  }});

{test_indent}  const after = new BN(getTokenBalance(svm, creatorRewardAta));
{test_indent}  const delta = after.sub(before);
{test_indent}  const vaultResidual = new BN(getTokenBalance(svm, rewardVault));

{test_indent}  console.log("PHASE5F_CREATOR_REWARD0_DEAD_LIQUIDITY_TAKEOVER_DELTA", {{
{test_indent}    before: before.toString(),
{test_indent}    after: after.toString(),
{test_indent}    delta: delta.toString(),
{test_indent}    vaultResidual: vaultResidual.toString(),
{test_indent}  }});

{test_indent}  expect(delta.gtn(0)).eq(true);
{test_indent}  expect(vaultResidual.eqn(0)).eq(true);
{test_indent}}});

'''

          if "PHASE5F: creator can reassign already-funded reward0 funder" not in s:
              insert_at = line_end + 1
              s = s[:insert_at] + test_block + s[insert_at:]

          if "PHASE5F: creator can reassign already-funded reward0 funder" not in s:
              raise SystemExit("Phase5F insertion failed")

          p.write_text(s)
          print("[patched]", p)
          PY

          echo "===== verify Phase5F insertion ====="
          grep -n "PHASE5F" tests/deadLiquidityReward.test.ts
          echo "===== inserted snippet ====="
          grep -n -A8 -B4 "PHASE5F" tests/deadLiquidityReward.test.ts

      - name: Install deps
        working-directory: damm-v2
        run: |
          pnpm config set strict-dep-builds false
          pnpm install

      - name: Run Phase5F
        working-directory: damm-v2
        run: |
          bun run build-local
          ANCHOR_WALLET=keys/local/admin-bossj3JvwiNK7pvjr149DqdtJxf2gdygbcmEPTkb2F1.json \
            bunx ts-mocha -p ./tsconfig.json -t 1000000 tests/deadLiquidityReward.test.ts --grep "PHASE5F" \
            2>&1 | tee phase5f.log

          if grep -q "0 passing" phase5f.log; then
            echo "[fatal] Phase5F grep matched zero tests"
            exit 1
          fi

      - name: Upload Phase5F log
        uses: actions/upload-artifact@v4
        with:
          name: phase5f-dead-liquidity-funder-reassignment-log
          path: damm-v2/phase5f.log
