name: DAMM v2 Phase5G old funder denied after reassignment

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dammv2-phase5g-old-funder-denied.yml"

jobs:
  phase5g:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Checkout DAMM v2
        uses: actions/checkout@v4
        with:
          repository: MeteoraAg/damm-v2
          path: damm-v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - name: Install Solana/Agave CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI 1.0.2
        run: |
          cargo install \
            --git https://github.com/solana-foundation/anchor \
            --tag v1.0.2 \
            anchor-cli \
            --locked \
            --force

      - name: Patch Phase5G test
        working-directory: damm-v2
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("tests/deadLiquidityReward.test.ts")
          s = p.read_text()

          if "updateRewardFunder" not in s:
              s, n = re.subn(
                  r'(\n\s*}\s*from\s*"./helpers";)',
                  r'\n    updateRewardFunder,\1',
                  s,
                  count=1,
              )
              if n != 1:
                  raise SystemExit("Could not insert updateRewardFunder import")

          if 'getOrCreateAssociatedTokenAccount' not in s:
              s = s.replace(
                  'import { BaseFeeMode, encodeFeeTimeSchedulerParams } from "./helpers/feeCodec";\n',
                  'import { BaseFeeMode, encodeFeeTimeSchedulerParams } from "./helpers/feeCodec";\n'
                  'import { getOrCreateAssociatedTokenAccount } from "./helpers/token";\n',
              )

          test_lines = [
              '  it("PHASE5G: old external funder is denied after reward0 reassignment while creator succeeds", async () => {',
              '    const { pool, position, rewardEnd, rewardMid } = await setupFundedCompoundingPool();',
              '',
              '    expect(getPool(svm, pool).rewardInfos[REWARD_INDEX].funder.toString()).eq(',
              '      funder.publicKey.toString()',
              '    );',
              '',
              '    await updateRewardFunder(svm, {',
              '      index: REWARD_INDEX,',
              '      signer: creator,',
              '      pool,',
              '      newFunder: creator.publicKey,',
              '    });',
              '',
              '    expect(getPool(svm, pool).rewardInfos[REWARD_INDEX].funder.toString()).eq(',
              '      creator.publicKey.toString()',
              '    );',
              '',
              '    const creatorRewardAta = getOrCreateAssociatedTokenAccount(',
              '      svm,',
              '      creator,',
              '      rewardMint,',
              '      creator.publicKey,',
              '      TOKEN_PROGRAM_ID',
              '    );',
              '',
              '    warpToTimestamp(svm, rewardMid);',
              '',
              '    await claimReward(svm, {',
              '      index: REWARD_INDEX,',
              '      user: creator,',
              '      pool,',
              '      position,',
              '      skipReward: 0,',
              '    });',
              '',
              '    await removeAllLiquidity(svm, {',
              '      owner: creator,',
              '      pool,',
              '      position,',
              '      tokenAAmountThreshold: new BN(0),',
              '      tokenBAmountThreshold: new BN(0),',
              '    });',
              '',
              '    const afterExit = getPool(svm, pool);',
              '    expect(afterExit.liquidity.toString()).eq(DEAD_LIQUIDITY.toString());',
              '',
              '    warpToTimestamp(svm, rewardEnd.addn(1));',
              '',
              '    let oldFunderFailed = false;',
              '    let oldFunderError = "";',
              '    try {',
              '      await withdrawDeadLiquidityReward(svm, {',
              '        index: REWARD_INDEX,',
              '        funder,',
              '        pool,',
              '      });',
              '    } catch (e) {',
              '      oldFunderFailed = true;',
              '      oldFunderError = String(e).slice(0, 300);',
              '    }',
              '',
              '    console.log("PHASE5G_OLD_FUNDER_AFTER_REASSIGNMENT_DENIED", {',
              '      oldFunderFailed,',
              '      oldFunderError,',
              '    });',
              '',
              '    expect(oldFunderFailed).eq(true);',
              '',
              '    const rewardVault = afterExit.rewardInfos[REWARD_INDEX].vault;',
              '    const before = new BN(getTokenBalance(svm, creatorRewardAta));',
              '',
              '    await withdrawDeadLiquidityReward(svm, {',
              '      index: REWARD_INDEX,',
              '      funder: creator,',
              '      pool,',
              '    });',
              '',
              '    const after = new BN(getTokenBalance(svm, creatorRewardAta));',
              '    const delta = after.sub(before);',
              '    const vaultResidual = new BN(getTokenBalance(svm, rewardVault));',
              '',
              '    console.log("PHASE5G_CREATOR_AFTER_OLD_FUNDER_DENIED_DELTA", {',
              '      before: before.toString(),',
              '      after: after.toString(),',
              '      delta: delta.toString(),',
              '      vaultResidual: vaultResidual.toString(),',
              '    });',
              '',
              '    expect(delta.gtn(0)).eq(true);',
              '    expect(vaultResidual.eqn(0)).eq(true);',
              '  });',
              '',
          ]

          test_block = "\n".join(test_lines)

          if "PHASE5G: old external funder is denied" not in s:
              last_close = s.rfind("\n});")
              if last_close == -1:
                  raise SystemExit("Could not find final describe close")
              s = s[:last_close] + "\n" + test_block + s[last_close:]

          if "PHASE5G: old external funder is denied" not in s:
              raise SystemExit("Phase5G insertion failed")

          p.write_text(s)
          print("[patched]", p)
          PY

          echo "===== verify imports ====="
          grep -n -A35 -B5 "from \"./helpers\"" tests/deadLiquidityReward.test.ts | sed -n '1,90p'

          echo "===== verify Phase5G insertion ====="
          grep -n "PHASE5G" tests/deadLiquidityReward.test.ts
          grep -n -A10 -B6 "PHASE5G" tests/deadLiquidityReward.test.ts

      - name: Install deps
        working-directory: damm-v2
        run: |
          pnpm config set strict-dep-builds false
          pnpm install

      - name: Run Phase5G
        working-directory: damm-v2
        run: |
          set +e

          bun run build-local
          BUILD_STATUS=$?
          if [ "$BUILD_STATUS" -ne 0 ]; then
            exit "$BUILD_STATUS"
          fi

          ANCHOR_WALLET=keys/local/admin-bossj3JvwiNK7pvjr149DqdtJxf2gdygbcmEPTkb2F1.json \
            bunx ts-mocha -p ./tsconfig.json -t 1000000 tests/deadLiquidityReward.test.ts --grep "PHASE5G" \
            2>&1 | tee phase5g.log

          TEST_STATUS=${PIPESTATUS[0]}

          if ! grep -q "PHASE5G" phase5g.log; then
            echo "[fatal] Phase5G grep matched zero tests"
            exit 1
          fi

          exit "$TEST_STATUS"

      - name: Upload Phase5G log
        uses: actions/upload-artifact@v4
        with:
          name: phase5g-old-funder-denied-log
          path: damm-v2/phase5g.log
